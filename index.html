<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Skyline Media Group helps brands grow with conversion-driven websites, paid ads, and social media strategy."
    />
    <title>Skyline Media Group | Digital Growth Agency</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div id="app">
      <div class="boot-status" id="boot-status" role="status" aria-live="polite">
        <p class="boot-status__title">Loading Skyline Media Group...</p>
        <p class="boot-status__text">
          If this message remains, run this site from a local web server instead of opening
          index.html directly.
        </p>
      </div>
    </div>
    <script>
      window.__skylineAppLoaded = false;

      window.addEventListener("DOMContentLoaded", function () {
        window.setTimeout(function () {
          if (window.__skylineAppLoaded) {
            return;
          }

          var status = document.getElementById("boot-status");

          if (!status) {
            return;
          }

          status.classList.add("boot-status--error");
          status.innerHTML =
            '<p class="boot-status__title">Preview setup needed</p>' +
            '<p class="boot-status__text">Your browser likely blocked JavaScript modules from file://. Start a local server and open http://localhost:5500 instead.</p>';
        }, 1200);
      });
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
